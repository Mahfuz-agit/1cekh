name: Elite Knowledge Engine

on:
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install google-generativeai youtube-transcript-api

      - name: Run Main Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Force Commit and Push Files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generated knowledge node [Skip CI]"
          file_pattern: 'content/*'

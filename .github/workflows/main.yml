import os
import google.generativeai as genai
from youtube_transcript_api import YouTubeTranscriptApi

# API কনফিগারেশন
genai.configure(api_key=os.getenv("GEMINI_API_KEY"))

def get_video_notes(video_id):
    try:
        # ইউটিউব থেকে ট্রান্সক্রিপ্ট নেওয়া
        transcript = YouTubeTranscriptApi.get_transcript(video_id)
        text = " ".join([i['text'] for i in transcript])
        
        # জেমিনি প্রম্পট
        model = genai.GenerativeModel('gemini-1.5-flash')
        prompt = f"""
        Analyze this lecture transcript and provide:
        1. Executive Summary (Concise)
        2. Key Takeaways (Bullet points)
        3. Knowledge Graph/Concept Map (Structured ideas)
        4. Actionable Steps to master this topic
        
        Transcript: {text[:15000]}
        """
        
        response = model.generate_content(prompt)
        return response.text
    except Exception as e:
        return f"Error occurred: {str(e)}"

# প্রসেস শুরু
video_id = "jNQXAC9IVRw" # আপনি চাইলে এখানে নতুন ভিডিও আইডি দিতে পারেন
content = get_video_notes(video_id)

# ফাইল সেভ করা
filename = f"knowledge_node_{video_id}.md"
with open(filename, "w", encoding="utf-8") as f:
    f.write(f"# Elite Knowledge Node: {video_id}\n\n")
    f.write(content)

print(f"Successfully generated {filename}")
